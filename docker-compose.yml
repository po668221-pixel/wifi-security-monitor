version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - WIFI_INTERFACE=wlan0mon
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/wifi_monitor.db
      - REDIS_URL=redis://redis:6379/0
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - CORS_ORIGINS=http://localhost:3000
      - SLACK_WEBHOOK=
      - TELEGRAM_TOKEN=
      - TELEGRAM_CHAT_ID=
    volumes:
      - db_data:/app/data
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A backend.worker:celery_app worker --loglevel=info
    depends_on:
      - redis
    environment:
      - WIFI_INTERFACE=wlan0mon
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/wifi_monitor.db
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_FROM=
      - ALERT_EMAIL_TO=
      - SLACK_WEBHOOK=
      - TELEGRAM_TOKEN=
      - TELEGRAM_CHAT_ID=
    volumes:
      - db_data:/app/data

volumes:
  db_data:
